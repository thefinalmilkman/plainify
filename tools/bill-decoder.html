<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bill Decoder — Plainify</title>
  <meta name="description" content="Paste your confusing phone, utility, or cable bill. Get every charge explained in plain English.">
  <link rel="canonical" href="https://plainify.com/tools/bill-decoder">
  <meta property="og:title" content="Bill Decoder — Plainify">
  <meta property="og:description" content="Paste your confusing phone, utility, or cable bill. Get every charge explained in plain English.">
  <meta property="og:url" content="https://plainify.com/tools/bill-decoder">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Plainify">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Bill Decoder — Plainify">
  <meta name="twitter:description" content="Paste your confusing phone, utility, or cable bill. Get every charge explained in plain English.">
  <link rel="stylesheet" href="../style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>">
  <!-- Analytics: replace UMAMI_WEBSITE_ID after creating account at umami.is -->
  <script defer src="https://cloud.umami.is/script.js" data-website-id="UMAMI_WEBSITE_ID"></script>
</head>
<body>
  <main>
    <div class="tool-page">
      <a class="back-link" href="../index.html">← All tools</a>

      <div style="font-size:2rem;margin-bottom:0.5rem">🧾</div>
      <h1>Bill Decoder</h1>
      <p class="subtitle">Paste your phone, internet, cable, or electric bill. Find out what each charge actually is, flag anything suspicious, and get exact scripts to lower what you pay.</p>

      <textarea
        class="input-area"
        id="input"
        placeholder="Paste your bill text here...

Examples:
• AT&T Wireless — Monthly Plan $65.00 / Admin & Telco Recovery Fee $3.49 / Regulatory Cost Recovery Fee $1.50 / AT&T Next installment $28.00
• Comcast Xfinity — Internet Starter 200 Mbps $55.00 / Broadcast TV Fee $19.45 / Regional Sports Fee $14.45 / Service Protection Plan $4.99
• CenterPoint Energy — Energy Charge 842 kWh @ $0.08 / Transmission Cost Recovery $12.40 / Distribution Cost Recovery $18.20 / Taxes & Fees $9.11"></textarea>

      <button class="run-btn" id="run-btn" onclick="decodeBill()">
        Decode this bill
      </button>

      <div class="output-box" id="output">
        <div class="label">Bill Breakdown</div>
        <div id="output-text"></div>
        <button class="copy-btn" onclick="copy()">Copy</button>
      </div>
    </div>
  </main>

  <footer>
    <p>No signup. No tracking. No bloat.</p>
    <p>Built by <a href="https://redkingsdesigns.netlify.app" target="_blank">RedKingsDesigns</a></p>
  </footer>

  <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "What is a bill decoder?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "A bill decoder explains every line item and charge on your phone, cable, utility, or subscription bill in plain English so you know exactly what you're paying for."
      }
    },
    {
      "@type": "Question",
      "name": "Why are bills so confusing?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Carriers and utilities use industry jargon, vague fee names, and regulatory surcharges that are deliberately hard to understand. A bill decoder cuts through that language."
      }
    },
    {
      "@type": "Question",
      "name": "Is this tool free?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. Plainify's Bill Decoder is completely free with no signup required."
      }
    }
  ]
}
</script>

  <script>
    async function decodeBill() {
      const input = document.getElementById("input").value.trim();
      if (!input) return;

      const btn = document.getElementById("run-btn");
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Decoding…';

      try {
        const res = await fetch("/api/decode-bill", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ bill: input }),
        });
        const data = await res.json();

        const out = document.getElementById("output");
        document.getElementById("output-text").textContent = data.result || data.error || "Something went wrong.";
        out.classList.add("visible");
      } catch (e) {
        document.getElementById("output-text").textContent = "Could not reach the server. Try again.";
        document.getElementById("output").classList.add("visible");
      } finally {
        btn.disabled = false;
        btn.textContent = "Decode this bill";
      }
    }

    function copy() {
      const text = document.getElementById("output-text").textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector(".copy-btn");
        btn.textContent = "Copied!";
        setTimeout(() => btn.textContent = "Copy", 1500);
      });
    }

    document.getElementById("input").addEventListener("keydown", e => {
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") decodeBill();
    });
  </script>
</body>
</html>
