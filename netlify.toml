[build]
  command   = "npm install"
  publish   = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/health"
  to     = "/.netlify/functions/api/health"
  status = 200
  force  = true
